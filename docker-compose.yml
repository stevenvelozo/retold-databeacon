# Docker Compose for running retold-databeacon as a service.
#
# Usage:
#   docker compose up -d              # Start DataBeacon
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f            # Tail logs
#   docker compose down               # Stop
#
# Data persists in the 'beacon-data' volume across restarts.
# Access the web UI at http://localhost:8389/

services:
  databeacon:
    build: .
    container_name: retold-databeacon
    restart: unless-stopped
    ports:
      - "${BEACON_PORT:-8389}:8389"
    volumes:
      - beacon-data:/app/data
    environment:
      - PORT=8389
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8389/beacon/ultravisor/status',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  beacon-data:
