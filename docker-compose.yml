version: '3.8'

# Docker Compose for retold-databeacon integration testing.
# Provides a MySQL instance pre-loaded with the Chinook sample database.
#
# Usage:
#   docker compose up -d mysql
#   npm run test-browser
#   docker compose down

services:
  mysql:
    image: mysql:8
    container_name: databeacon-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: chinook
    ports:
      - "23389:3306"
    volumes:
      - ./test/docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
